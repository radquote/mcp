name: publish-mcpb

on:
  push:
    tags:
      - 'mcpb-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install workspace deps
        run: npm ci
      - name: Install mcpb CLI globally
        run: npm install -g @anthropic-ai/mcpb@^2.1.2
      - name: Pack mcpb
        run: npm run pack:mcpb -w @radquote/mcpb-proxy
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/mcpb-proxy/*.mcpb
          prerelease: true
          generate_release_notes: true
